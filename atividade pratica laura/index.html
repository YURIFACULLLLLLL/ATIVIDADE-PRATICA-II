<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Rede Social</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <nav class="sidebar">
        <button>🏠 Início</button>
        <button>🔍 Pesquisa</button>
        <button>➕ Nova Postagem</button>
        <button>👤 Perfil</button>
    </nav>

    <main class="conteudo">

        <div class="perfil">
            <img src="joker-persona-video.webp" alt="Foto Perfil">
            <div class="info-perfil">
                <h2>Yuri Salim Dau Marques</h2>
                <p>@swgiruy</p>
            </div>
            <button class="editar">Editar Perfil</button>
        </div>

        <div class="postagem-form">
            <input type="text" placeholder="Quais são as novidades?">
            <button>Postar</button>
        </div>

        <div class="post">
            <div class="post-header">
                <img src="OIP2.webp" alt="Perfil">
                <div>
                    <strong>Robinho</strong>
                    <p>@Robinho22</p>
                </div>
            </div>
            <p class="conteudo-post">
                Hoje foi um ótimo dia para jogar bola!
            </p>
            <div class="acoes">
                <button>❤️ 14 curtidas</button>
                <button>💬 3 comentários</button>
            </div>
        </div>

        <div class="post">
            <div class="post-header">
                <img src="OIP.webp" alt="Perfil">
                <div>
                    <strong>Henrique Soares</strong>
                    <p>@HQueridao</p>
                </div>
            </div>
            <p class="conteudo-post">
                cade o forro pra eu dancar um piseiro gente ?
            </p>
            <div class="acoes">
                <button>❤️ 9 curtidas</button>
                <button>💬 1 comentário</button>
            </div>
        </div>

    </main>

</div>

<script src="js/script.js"></script>
</body>
</html>
